<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --teal:        #0F6478;
  --teal-dark:   #0a4050;
  --header-h:    88px;
  --tab-h:       48px;
  --nav-h:       54px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #F1F5F9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #1E293B;
}

/* ── Header ──────────────────────────────────────────────── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--teal-dark);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  padding-top: env(safe-area-inset-top);
  z-index: 20;
}

#logoWrap { display: flex; align-items: center; gap: 12px; }
#logoImg  { width: 44px; height: 44px; object-fit: contain; }
#appTitle { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
#headerRight { text-align: right; }
#uhr { font-size: 24px; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
#datum { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }

/* ── Tab-Navigation ───────────────────────────────────────── */
#tabs {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  height: var(--tab-h);
  background: #F1F5F9;
  display: flex;
  align-items: center;
  padding: 6px 12px;
  gap: 8px;
  border-bottom: 1px solid #E2E8F0;
  z-index: 19;
}

.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 34px;
  font-size: 14px;
  font-weight: 500;
  color: #64748B;
  cursor: pointer;
  border-radius: 10px;
  border: 1.5px solid transparent;
  background: transparent;
  transition: all 0.15s;
  user-select: none;
}

.tab:hover { background: #E2E8F0; color: #1E293B; }

.tab.aktiv {
  background: var(--teal-dark);
  color: #fff;
  border-color: var(--teal-dark);
  font-weight: 600;
}

/* ── Inhalt ───────────────────────────────────────────────── */
#inhalt {
  position: fixed;
  top: calc(var(--header-h) + var(--tab-h));
  left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
}

/* ── Lade-Spinner ─────────────────────────────────────────── */
.spinner-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
  gap: 16px;
  color: #94A3B8;
  font-size: 14px;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid #E2E8F0;
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tag-Karte ────────────────────────────────────────────── */
.tag-karte {
  background: #fff;
  border-radius: 16px;
  border: 0.5px solid #E2E8F0;
  margin-bottom: 14px;
  overflow: hidden;
}

.tag-header {
  background: var(--teal-dark);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tag-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
}

.tag-datum-klein {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

/* Heute-Highlight */
.tag-karte.heute .tag-header {
  background: var(--teal);
}

.tag-karte.heute .tag-header::after {
  content: 'Heute';
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── Schichten-Grid ───────────────────────────────────────── */
.schichten-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

@media (max-width: 480px) {
  .schichten-grid { grid-template-columns: 1fr; }
}

.schicht {
  padding: 12px 14px;
  border-right: 0.5px solid #F1F5F9;
}

.schicht:last-child { border-right: none; }

.schicht-titel {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: #94A3B8;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.schicht-titel-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.dot-vm { background: #F59E0B; }
.dot-nm { background: #6366F1; }

/* ── Mitarbeiter-Zeile ────────────────────────────────────── */
.ma-zeile {
  display: flex;
  align-items: flex-start;
  padding: 7px 0;
  border-bottom: 0.5px solid #F8FAFC;
  gap: 10px;
}

.ma-zeile:last-child { border-bottom: none; }

.ma-name-plan {
  font-size: 14px;
  font-weight: 600;
  color: #1E293B;
  min-width: 80px;
  flex-shrink: 0;
}

.ma-zeit {
  font-size: 13px;
  font-weight: 600;
  color: #1E293B;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 100px;
}

.ma-details {
  font-size: 13px;
  color: #64748B;
  line-height: 1.5;
  flex: 1;
}

/* ── Tagesinfos ───────────────────────────────────────────── */
.tages-infos {
  border-top: 0.5px solid #F1F5F9;
  padding: 9px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.info-badge {
  font-size: 12px;
  background: #FEF9C3;
  color: #92400E;
  border: 0.5px solid #FDE68A;
  border-radius: 20px;
  padding: 3px 10px;
  font-weight: 500;
}

/* ── Leerer Tag (Feiertag/Sonntag) ──────────────────────────── */
.tag-karte.tag-leer .tag-header {
  background: #64748B;
  opacity: 0.75;
}
.tag-karte.tag-leer { border-color: #E2E8F0; }

/* ── Leer-State ───────────────────────────────────────────── */
.leer-state {
  text-align: center;
  padding: 48px 24px;
  color: #94A3B8;
  font-size: 15px;
}

/* ── Fehler-Banner ─────────────────────────────────────────── */
#fehlerBanner {
  display: none;
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 10px;
  color: #991B1B;
  font-size: 13px;
  padding: 12px 16px;
  margin-bottom: 16px;
}


</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
//  KONFIGURATION  ← hier anpassen
// ═══════════════════════════════════════════════════════════════
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-sYOkUn9oE2V14YHpmZUY8hlkvOZKVOJdhqfheTj0Wqc9dZacFPbgiYM3WYW8TDCN0A/exec";
// ═══════════════════════════════════════════════════════════════

let aktuellerTab = 'heute';
let cacheData = {};  // In-memory cache
const CACHE_VERSION = 'bios_plan_v1';
const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 Stunden

function cacheSet(key, data) {
  cacheData[key] = data;
  try {
    localStorage.setItem(CACHE_VERSION + '_' + key, JSON.stringify({
      data, ts: Date.now()
    }));
  } catch(e) {}
}

function cacheGet(key) {
  if (cacheData[key]) return cacheData[key];
  try {
    const raw = localStorage.getItem(CACHE_VERSION + '_' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null; // abgelaufen
    cacheData[key] = data;
    return data;
  } catch(e) { return null; }
}

function cacheClear() {
  cacheData = {};
  try {
    Object.keys(localStorage)
      .filter(k => k.startsWith(CACHE_VERSION))
      .forEach(k => localStorage.removeItem(k));
  } catch(e) {}
}

// ── Uhr ───────────────────────────────────────────────────────
function updateUhr() {
  const n = new Date();
  document.getElementById("uhr").textContent =
    n.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("datum").textContent =
    n.toLocaleDateString("de-DE", { weekday: "short", day: "numeric", month: "long", year: "numeric" });
}
setInterval(updateUhr, 1000); updateUhr();

// ── Datum-Hilfsfunktionen ─────────────────────────────────────
function heute() { return new Date(); }

function datumStr(d) {
  return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
}

function datumStrPad(d) {
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function addTage(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function wochenStart(d) {
  const r = new Date(d);
  const day = r.getDay();
  const diff = day === 0 ? -6 : 1 - day; // Montag = Start
  r.setDate(r.getDate() + diff);
  return r;
}

function monatsStart(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function monatsEnde(d)  { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }

function wochentag(str) {
  // "17.4.2026" → "Freitag, 17. April"
  const p = str.split('.');
  const d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return d.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
}

function istHeute(datumStr_) {
  const h = heute();
  const hStr = `${h.getDate()}.${h.getMonth()+1}.${h.getFullYear()}`;
  // normalisieren
  const p = datumStr_.split('.');
  const dStr = `${parseInt(p[0])}.${parseInt(p[1])}.${parseInt(p[2])}`;
  return dStr === hStr;
}

// ── Tab wechseln ──────────────────────────────────────────────
function wechselTab(tab) {
  aktuellerTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('aktiv', ['heute','woche','monat'][i] === tab);
  });
  ladePlan();
}

// ── Datumsbereich je Tab ──────────────────────────────────────
function getBereich() {
  const h = heute();
  if (aktuellerTab === 'heute') {
    return { von: datumStr(h), bis: datumStr(h) };
  }
  if (aktuellerTab === 'woche') {
    const ws = wochenStart(h);
    return { von: datumStr(ws), bis: datumStr(addTage(ws, 6)) };
  }
  // monat
  return { von: datumStr(monatsStart(h)), bis: datumStr(monatsEnde(h)) };
}

// ── Plan laden ────────────────────────────────────────────────
async function ladePlan(stille = false) {
  const { von, bis } = getBereich();
  const cacheKey = `${von}_${bis}`;

  // Sofort aus Cache zeigen (stale-while-revalidate)
  const cached = cacheGet(cacheKey);
  if (cached) {
    renderPlan(cached);
    // Im Hintergrund still aktualisieren
    fetchPlan(von, bis, cacheKey, true);
    return;
  }

  // Kein Cache – Spinner zeigen und warten
  if (!stille) zeigeLaden();
  await fetchPlan(von, bis, cacheKey, stille);
}

async function fetchPlan(von, bis, cacheKey, stille) {
  if (!WEB_APP_URL.startsWith('https://script.google.com')) {
    const demo = buildDemoData(von, bis);
    cacheSet(cacheKey, demo);
    renderPlan(demo);
    vorausladen();
    return;
  }

  try {
    const url = `${WEB_APP_URL}?action=getArbeitsplan&von=${encodeURIComponent(von)}&bis=${encodeURIComponent(bis)}&t=${Date.now()}`;
    const resp = await fetch(url);
    const text = await resp.text();
    const data = JSON.parse(text);
    if (data.error) throw new Error(data.error);
    const tage = data.tage || [];
    cacheSet(cacheKey, tage);
    renderPlan(tage);
    vorausladen();
  } catch (err) {
    console.error('Plan Fehler:', err);
    if (!stille) {
      zeigeFehler('Arbeitsplan konnte nicht geladen werden: ' + err.message);
      document.getElementById('plan').innerHTML = '';
    }
  }
}

// Nächsten Tab im Hintergrund vorausladen
function vorausladen() {
  const reihenfolge = ['heute', 'woche', 'monat'];
  const naechster = reihenfolge[(reihenfolge.indexOf(aktuellerTab) + 1) % 3];
  const vorheriger = aktuellerTab;
  aktuellerTab = naechster;
  const { von, bis } = getBereich();
  const key = `${von}_${bis}`;
  aktuellerTab = vorheriger;
  if (!cacheGet(key) && WEB_APP_URL.startsWith('https://script.google.com')) {
    fetchPlan(von, bis, key, true).catch(() => {});
  }
}

// ── Laden-Anzeige ─────────────────────────────────────────────
function zeigeLaden() {
  document.getElementById('fehlerBanner').style.display = 'none';
  document.getElementById('plan').innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div>Wird geladen…</div>
    </div>`;
}

// ── Plan rendern ──────────────────────────────────────────────
function renderPlan(tage) {
  const plan = document.getElementById('plan');
  const { von, bis } = getBereich();

  // Vollständige Tagesliste generieren (inkl. Sonntage/Feiertage)
  const alleTageDaten = {};
  (tage || []).forEach(t => { alleTageDaten[t.datum] = t; });

  const vp = von.split('.'), bp = bis.split('.');
  const start = new Date(parseInt(vp[2]), parseInt(vp[1])-1, parseInt(vp[0]));
  const end   = new Date(parseInt(bp[2]), parseInt(bp[1])-1, parseInt(bp[0]));
  const alleTage = [];
  const cur = new Date(start);
  while (cur <= end) {
    const ds = `${cur.getDate()}.${cur.getMonth()+1}.${cur.getFullYear()}`;
    alleTage.push(alleTageDaten[ds] || { datum: ds, vormittag: [], nachmittag: [], infos: [], leer: true });
    cur.setDate(cur.getDate() + 1);
  }

  if (alleTage.length === 0) {
    plan.innerHTML = '<div class="leer-state">Keine Einträge für diesen Zeitraum gefunden.</div>';
    return;
  }

  plan.innerHTML = alleTage.map(tag => renderTag(tag)).join('');
}

function renderTag(tag) {
  const heute_ = istHeute(tag.datum);
  const wt = wochentag(tag.datum);
  const leer = tag.leer || (tag.vormittag.length === 0 && tag.nachmittag.length === 0);

  // Leerer Tag (Sonntag/Feiertag) – kompakte Ansicht
  if (leer) {
    return `
    <div class="tag-karte tag-leer ${heute_ ? 'heute' : ''}">
      <div class="tag-header">
        <div class="tag-name">${wt}</div>
        <div style="font-size:12px;opacity:0.6;">kein Dienst</div>
      </div>
    </div>`;
  }

  const vmHtml = tag.vormittag.length > 0
    ? tag.vormittag.map(ma => renderMaZeile(ma)).join('')
    : '<div class="leer-state" style="padding:12px 0;font-size:13px;color:#94A3B8;">–</div>';

  const nmHtml = tag.nachmittag.length > 0
    ? tag.nachmittag.map(ma => renderMaZeile(ma)).join('')
    : '<div class="leer-state" style="padding:12px 0;font-size:13px;color:#94A3B8;">–</div>';

  const infosHtml = tag.infos.length > 0
    ? `<div class="tages-infos">${tag.infos.map(i =>
        `<span class="info-badge">ℹ ${i}</span>`).join('')}</div>`
    : '';

  return `
    <div class="tag-karte ${heute_ ? 'heute' : ''}">
      <div class="tag-header">
        <div class="tag-name">${wt}</div>
      </div>
      <div class="schichten-grid">
        <div class="schicht">
          <div class="schicht-titel">
            <div class="schicht-titel-dot dot-vm"></div>
            Vormittag
          </div>
          ${vmHtml}
        </div>
        <div class="schicht">
          <div class="schicht-titel">
            <div class="schicht-titel-dot dot-nm"></div>
            Nachmittag
          </div>
          ${nmHtml}
        </div>
      </div>
      ${infosHtml}
    </div>`;
}

function renderMaZeile(ma) {
  const zeitStr = (ma.von && ma.bis) ? `${ma.von}–${ma.bis}` : '';
  return `
    <div class="ma-zeile">
      <div class="ma-name-plan">${ma.name}</div>
      <div class="ma-zeit">${zeitStr}</div>
      <div class="ma-details">${ma.taetigkeit || ''}</div>
    </div>`;
}

// ── Fehler ────────────────────────────────────────────────────
function zeigeFehler(msg) {
  const b = document.getElementById('fehlerBanner');
  b.textContent = msg;
  b.style.display = 'block';
}

// ── Demo-Daten (ohne echte URL) ───────────────────────────────
function buildDemoData(von, bis) {
  const vp = von.split('.'); const bp = bis.split('.');
  const start = new Date(parseInt(vp[2]), parseInt(vp[1])-1, parseInt(vp[0]));
  const end   = new Date(parseInt(bp[2]), parseInt(bp[1])-1, parseInt(bp[0]));
  const tage = [];
  const cur = new Date(start);
  while (cur <= end) {
    const ds = `${cur.getDate()}.${cur.getMonth()+1}.${cur.getFullYear()}`;
    tage.push({
      datum: ds,
      vormittag: [
        { name: 'Daniel',   von: '06:00', bis: '13:00', pause: '00:20', taetigkeit: 'Frische/Kasse' },
        { name: 'Annerose', von: '06:00', bis: '13:00', pause: '00:15', taetigkeit: 'Frische/Theke' },
        { name: 'Anna',     von: '06:30', bis: '14:00', pause: '00:15', taetigkeit: 'Theke' },
      ],
      nachmittag: [
        { name: 'Christoph', von: '12:00', bis: '19:45', pause: '00:15', taetigkeit: 'Frische/Kasse' },
        { name: 'Hannah',    von: '13:00', bis: '19:45', pause: '00:20', taetigkeit: 'Theke' },
      ],
      infos: cur.getDay() === 1 ? ['Linus krank'] : []
    });
    cur.setDate(cur.getDate() + 1);
  }
  return tage;
}

// ── Refresh ───────────────────────────────────────────────────
function refreshPlan() {
  const btn = document.getElementById('refreshBtn');
  btn.style.transform = 'rotate(360deg)';
  btn.style.transition = 'transform 0.5s ease';
  setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 500);
  cacheClear();
  ladePlan();
}

// Auto-Refresh alle 5 Minuten
setInterval(() => { cacheClear(); ladePlan(true); }, 6 * 60 * 60 * 1000);

// ── Init ──────────────────────────────────────────────────────
